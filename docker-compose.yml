services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fantaanalytics}
      POSTGRES_USER: ${POSTGRES_USER:-fantaanalytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fantaanalytics_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fantaanalytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fantaanalytics}:${POSTGRES_PASSWORD:-fantaanalytics_dev}@postgres:5432/${POSTGRES_DB:-fantaanalytics}
      ANALYTICS_API_HOST: 0.0.0.0
      ANALYTICS_API_PORT: 8000
    ports:
      - "${ANALYTICS_API_PORT:-8000}:8000"
    volumes:
      - fantaanalytics_raw_data:/app/data/raw
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')\""]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: FantaAnalytics
      APP_ENV: ${API_APP_ENV:-local}
      APP_KEY: ${API_APP_KEY:-base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=}
      APP_DEBUG: ${API_APP_DEBUG:-false}
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${APP_POSTGRES_DB:-fantaanalytics_app}
      DB_USERNAME: ${POSTGRES_USER:-fantaanalytics}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fantaanalytics_dev}
      ANALYTICS_BASE_URL: http://analytics:8000
      ANALYTICS_TIMEOUT: ${ANALYTICS_TIMEOUT:-5}
      ANALYTICS_CONNECT_TIMEOUT: ${ANALYTICS_CONNECT_TIMEOUT:-2}
      ANALYTICS_RETRIES: ${ANALYTICS_RETRIES:-2}
    ports:
      - "${API_PORT:-8081}:8080"
    depends_on:
      analytics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "$$c=@file_get_contents('http://127.0.0.1:8080/api/v1/health'); exit($$c===false?1:0);"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
volumes:
  fantaanalytics_postgres_data:
  fantaanalytics_raw_data:
